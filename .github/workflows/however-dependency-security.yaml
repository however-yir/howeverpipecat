name: however-dependency-security

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-however.*"

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run dependency security scan
        run: bash scripts/however_dependency_security_scan.sh
