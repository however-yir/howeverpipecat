name: however runtime bug
description: Report a runtime problem in howeverpipecat distribution
title: "[however-runtime] "
labels:
  - bug
  - however
body:
  - type: markdown
    attributes:
      value: |
        请尽量提供完整复现信息，方便快速定位问题。

  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 你遇到了什么问题？
      placeholder: 简要描述问题现象
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请按步骤描述
      placeholder: |
        1. 执行 ...
        2. 配置 ...
        3. 触发 ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: Python、系统、依赖版本、分支/commit
      placeholder: |
        - OS:
        - Python:
        - install command:
        - branch/commit:
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: 配置与端点（可脱敏）
      description: 提供 `HOWEVER_*` 关键配置（请脱敏）
      placeholder: |
        HOWEVER_ENV=...
        HOWEVER_REGION=...
        HOWEVER_OLLAMA_BASE_URL=...
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 日志片段
      description: 粘贴关键报错日志
      render: shell
    validations:
      required: true
